info:
  title: juniors bootcamp backend 🔥
  description: Апи для выполнения индивидуальных заданий
  version: "1.0"
  contact: {}
tags: []
servers:
  - url: ""
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    CreateOtpDto:
      type: object
      properties:
        phone:
          type: string
          example: "89990009999"
      required:
        - phone
    OtpResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Статус запроса
        reason:
          type: string
          description: Причина ошибки
        retryDelay:
          type: number
          example: 120000
          description: Время запроса повторного отп кода в мс
      required:
        - success
        - retryDelay
    SignInDto:
      type: object
      properties:
        phone:
          type: string
          example: "89990009999"
          description: Номер телефона
        code:
          type: number
          example: 345231
          description: Отп код
      required:
        - phone
        - code
    User:
      type: object
      properties:
        _id:
          type: string
          description: ID пользователя
        phone:
          type: string
          example: "89990009999"
          description: Номер телефона
        firstname:
          type: string
          example: firstname
          description: Имя
        middlename:
          type: string
          example: middlename
          description: Отчество
        lastname:
          type: string
          example: lastname
          description: Фамилия
        email:
          type: string
          example: email@gmail.com
          description: Почта
        city:
          type: string
          example: city
          description: Город
      required:
        - _id
        - phone
    SignInResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Статус запроса
        reason:
          type: string
          description: Причина ошибки
        user:
          description: Пользователь
          allOf:
            - $ref: "#/components/schemas/User"
        token:
          type: string
          description: Пользовательский токен
      required:
        - success
        - user
        - token
    UpdateProfileProfileDto:
      type: object
      properties:
        firstname:
          type: string
          example: firstname
          description: Имя
        middlename:
          type: string
          example: middlename
          description: Отчество
        lastname:
          type: string
          example: lastname
          description: Фамилия
        email:
          type: string
          example: email@gmail.com
          description: Почта
        city:
          type: string
          example: city
          description: Город
    UpdateProfileDto:
      type: object
      properties:
        profile:
          description: Данные пользователя
          allOf:
            - $ref: "#/components/schemas/UpdateProfileProfileDto"
        phone:
          type: string
          example: "89990009999"
          description: Номер телефона
      required:
        - profile
        - phone
    UpdateProfileResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Статус запроса
        reason:
          type: string
          description: Причина ошибки
        user:
          description: Пользователь
          allOf:
            - $ref: "#/components/schemas/User"
      required:
        - success
        - user
    SessionResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Статус запроса
        reason:
          type: string
          description: Причина ошибки
        user:
          description: Пользователь
          allOf:
            - $ref: "#/components/schemas/User"
      required:
        - success
        - user
    FilmStaff:
      type: object
      properties:
        id:
          type: string
          example: "1"
          description: Идентификатор персоны
        professions:
          type: string
          description: Список профессий
          enum:
            - ACTOR
            - DIRECTOR
        fullName:
          type: string
          description: Полное имя персоны
        photo:
          type: string
          description: Фото персоны
      required:
        - id
        - professions
        - fullName
        - photo
    FilmUserRating:
      type: object
      properties:
        kinopoisk:
          type: string
          example: "10"
          description: Рейтинг кинопоиск
        imdb:
          type: string
          example: "10"
          description: Рейтинг imdb
      required:
        - kinopoisk
        - imdb
    Country:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
        code2:
          type: string
        id:
          type: number
      required:
        - name
        - code
        - code2
        - id
    Film:
      type: object
      properties:
        id:
